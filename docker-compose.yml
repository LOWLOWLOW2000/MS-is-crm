services:
  db:
    image: postgres:16
    container_name: is01-db
    environment:
      POSTGRES_DB: is_crm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - is01_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d is_crm"]
      interval: 3s
      timeout: 3s
      retries: 40

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: is01-api
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: postgresql://postgres:postgres@db:5432/is_crm
      WEB_BASE_URL: http://localhost:3000
      JWT_SECRET: change-me-in-compose-or-env-file
      JWT_EXPIRES_IN: 1d
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: is01-web
    environment:
      NODE_ENV: production
      PORT: "3000"
      NEXT_DIST_DIR: .next-build
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: change-me-in-compose-or-env-file
      API_BASE_URL: http://api:3001
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  is01_pgdata:
